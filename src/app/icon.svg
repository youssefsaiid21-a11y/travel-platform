<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Orbit ellipse tilted 35deg -->
  <ellipse cx="16" cy="16" rx="9.5" ry="5"
           stroke="white" stroke-width="1.5" fill="none" stroke-opacity="0.55"
           transform="rotate(-35 16 16)"/>
  <!-- Plane dot at top of orbit arc -->
  <circle cx="22.5" cy="9.5" r="3" fill="white"/>
  <!-- Subtle trail -->
  <path d="M22.5 9.5 Q18 14 12 18" stroke="white" stroke-width="1" stroke-opacity="0.3"
        fill="none" stroke-linecap="round"/>
</svg>
