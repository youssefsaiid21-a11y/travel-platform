<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Orbi mark: two crossing ellipses, matching src/components/OrbiLogo.tsx -->
  <ellipse cx="16" cy="16" rx="11" ry="6.5"
           stroke="white" stroke-width="1.4" fill="none" stroke-opacity="0.9"
           transform="rotate(-30 16 16)"/>
  <ellipse cx="16" cy="16" rx="11" ry="6.5"
           stroke="white" stroke-width="1.4" fill="none" stroke-opacity="0.6"
           transform="rotate(30 16 16)"/>
  <!-- Dot -->
  <circle cx="25.5" cy="10.5" r="2.3" fill="white"/>
</svg>
